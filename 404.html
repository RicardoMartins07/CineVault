<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover movies, build your watchlist, save favorites and rate your favourite films with CineVault."
    />
    <title>CineVault — Page not found</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favIcon.png" />
  </head>

  <body>
    <div class="app-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="CineVault home">
          <img
            src="assets/logo.png"
            alt="CineVault"
            class="brand__logo"
            width="220"
            height="52"
          />
        </a>
      </header>

      <main>
        <section class="empty-state page-404">
          <div class="empty-state__icon">404</div>
          <h1>Page not found</h1>
          <p>
            This page may have been moved, deleted, or never existed inside the
            vault.
          </p>
          <a class="primary-link" href="index.html">Back to Discover</a>
        </section>
      </main>
      <footer class="site-footer">
        <p>© 2026 CineVault</p>

        <a
          class="tmdb-credit"
          href="https://www.themoviedb.org/"
          target="_blank"
          rel="noopener"
        >
          <span>Powered by</span>

          <img
            src="assets/tmdb.svg"
            alt="The Movie Database"
            class="tmdb-logo"
            width="220"
            height="52"
          />
        </a>
      </footer>
    </div>
  </body>
</html>
